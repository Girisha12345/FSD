{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Chanakya University{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/site.css' %}">
</head>
<body {% block body_attrs %}{% endblock %}>
    <nav class="navbar navbar-expand-lg sticky-top navbar-dark custom-navbar">
        <div class="container">
            <a class="navbar-brand fw-semibold" href="{% url 'home' %}">Chanakya University</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'courses-page' %}">Courses</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'faculty-page' %}">Faculty</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'hostel-page' %}">Hostel</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'transport-page' %}">Transport</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'home' %}#contact">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="page-shell">
        {% block content %}{% endblock %}
    </main>

    <footer class="py-4 text-center text-light footer-shell">
        <div class="container">
            <small>Chanakya University Inquiry System</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="{% static 'js/site.js' %}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
